server:
  port: 8761

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false

  server:
    enable-self-preservation: false

managements:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoints:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.netflix.eureka: DEBUG
    com.netflix.discovery: DEBUG
    org.springframework: INFO
